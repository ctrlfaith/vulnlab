name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # Job 1: Backend Tests
  backend-tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: vulnlab
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/backend/package-lock.json

      - name: Install dependencies
        working-directory: app/backend
        run: npm ci

      - name: Run migrations
        working-directory: app/backend
        env:
          DATABASE_URL: mysql://root:root@localhost:3306/vulnlab
          JWT_SECRET: supersecretkey123
          PORT: 5000
        run: npx prisma migrate deploy

      - name: Install root dependencies
        run: npm ci

      - name: Run Jest tests
        env:
          DATABASE_URL: mysql://root:root@localhost:3306/vulnlab
          JWT_SECRET: supersecretkey123
          PORT: 5000
        run: npm test

  # Job 2: E2E Tests
  e2e-tests:
    runs-on: ubuntu-latest
    needs: backend-tests

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: vulnlab
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        working-directory: app/backend
        run: npm ci

      - name: Run migrations + seed
        working-directory: app/backend
        env:
          DATABASE_URL: mysql://root:root@localhost:3306/vulnlab
          JWT_SECRET: supersecretkey123
          PORT: 5000
        run: |
          npx prisma migrate deploy
          npx prisma db seed

      - name: Start backend
        working-directory: app/backend
        env:
          DATABASE_URL: mysql://root:root@localhost:3306/vulnlab
          JWT_SECRET: supersecretkey123
          PORT: 5000
        run: npm start &

      - name: Wait for backend
        run: |
          npm install -g wait-on
          npx wait-on http://localhost:5000 --timeout 30000

      - name: Install frontend dependencies
        working-directory: app/frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: app/frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: app/frontend
        env:
          CI: true
        run: npx playwright test --workers=1

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: app/frontend/playwright-report/
          retention-days: 30